# CyberSecurity-Skills 自动验证工作流
# 每次 Push 和 PR 时验证 index.json 与实际文件的一致性
name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run all validations
        id: validation
        run: |
          pip install -q jsonschema

          python3 << 'PYEOF'
          import json, os, re, sys
          from pathlib import Path
          from jsonschema import validate, ValidationError

          results = {"schema": None, "frontmatter": None, "links": None, "cli": None}
          errors_all = []

          # --- 1. Validate index.json against schema ---
          try:
              with open('index.json', 'r', encoding='utf-8') as f:
                  index = json.load(f)
              with open('index.schema.json', 'r', encoding='utf-8') as f:
                  schema = json.load(f)
              validate(instance=index, schema=schema)
              results["schema"] = "PASS"
              print("[PASS] index.json schema validation")
          except ValidationError as e:
              results["schema"] = f"FAIL: {e.message}"
              errors_all.append(f"index.json schema: {e.message}")
              print(f"[FAIL] index.json schema: {e.message}")
          except Exception as e:
              results["schema"] = f"ERROR: {e}"
              errors_all.append(f"index.json schema: {e}")
              print(f"[ERROR] index.json schema: {e}")

          # --- 2. Validate frontmatter in all skill files ---
          fm_errors = []
          fm_total = 0
          for root, dirs, files in os.walk('.'):
              if not root.endswith(os.sep + 'skills'):
                  continue
              if os.sep + 'framework' + os.sep in root:
                  continue
              for fname in sorted(files):
                  if not fname.endswith('.md'):
                      continue
                  fm_total += 1
                  fpath = os.path.join(root, fname)
                  with open(fpath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if not content.startswith('---'):
                      fm_errors.append(f'{fpath}: missing YAML frontmatter')
                      continue
                  match = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
                  if not match:
                      fm_errors.append(f'{fpath}: YAML frontmatter format error')
                      continue
                  yaml_text = match.group(1)
                  required = ['id:', 'title:', 'category:', 'difficulty:', 'tools:', 'last_updated:']
                  for field in required:
                      if field not in yaml_text:
                          fm_errors.append(f'{fpath}: missing field {field}')
                  id_match = re.search(r'id:\s*"?(\d+-\d+)"?', yaml_text)
                  if not id_match:
                      fm_errors.append(f'{fpath}: id format incorrect (expected NN-NNN)')

          if fm_errors:
              results["frontmatter"] = f"FAIL: {len(fm_errors)} issues out of {fm_total} files"
              errors_all.extend(fm_errors)
              print(f"[FAIL] Frontmatter: {len(fm_errors)} issues out of {fm_total} files")
          else:
              results["frontmatter"] = f"PASS: {fm_total} files validated"
              print(f"[PASS] Frontmatter: {fm_total} files validated")

          # --- 3. Check for broken relative links ---
          link_errors = []
          link_pattern = re.compile(r'\]\(([^)]+)\)')
          for root, dirs, files in os.walk('.'):
              if '.git' in root:
                  continue
              for fname in files:
                  if not fname.endswith('.md'):
                      continue
                  fpath = os.path.join(root, fname)
                  with open(fpath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for m in link_pattern.finditer(content):
                      link = m.group(1)
                      if link.startswith('http://') or link.startswith('https://'):
                          continue
                      if link.startswith('#'):
                          continue
                      if link.startswith('mailto:'):
                          continue
                      if '{' in link or '}' in link:
                          continue
                      if link.startswith('./attachments/'):
                          continue
                      if '/' not in link and '.' not in link:
                          continue
                      base_dir = os.path.dirname(fpath)
                      target = os.path.normpath(os.path.join(base_dir, link))
                      if not os.path.exists(target):
                          link_errors.append(f'{fpath}: broken link -> {link}')

          if link_errors:
              results["links"] = f"FAIL: {len(link_errors)} broken links"
              errors_all.extend(link_errors)
              print(f"[FAIL] Links: {len(link_errors)} broken links")
          else:
              results["links"] = "PASS"
              print("[PASS] Links: all valid")

          # --- 4. Run skill_query.py validate CLI ---
          ret = os.system("python skill_query.py validate 2>&1")
          if ret == 0:
              results["cli"] = "PASS"
              print("[PASS] skill_query.py validate")
          else:
              results["cli"] = "FAIL"
              errors_all.append("skill_query.py validate returned non-zero")
              print("[FAIL] skill_query.py validate")

          # --- Summary ---
          print("\n" + "=" * 50)
          passed = sum(1 for v in results.values() if v and v.startswith("PASS"))
          total = len(results)
          print(f"Validation Summary: {passed}/{total} checks passed")

          # Write results to file for GitHub Actions summary
          with open("/tmp/val_results.json", "w") as f:
              json.dump(results, f)
          with open("/tmp/val_errors.txt", "w") as f:
              f.write("\n".join(errors_all))

          if errors_all:
              sys.exit(1)
          PYEOF

      - name: Generate job summary
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os

          results_path = "/tmp/val_results.json"
          errors_path = "/tmp/val_errors.txt"

          if os.path.exists(results_path):
              with open(results_path) as f:
                  results = json.load(f)
          else:
              results = {}

          if os.path.exists(errors_path):
              with open(errors_path) as f:
                  raw = f.read().strip()
                  errors = raw.split("\n") if raw else []
          else:
              errors = []

          md = []
          md.append("## Validation Report\n")
          md.append(f"**Trigger**: push on main")
          md.append(f"**Commit**: ${{ github.sha }}\n")
          md.append("| Check | Status |")
          md.append("|-------|--------|")
          labels = {"schema": "Index.json Schema", "frontmatter": "Skill Frontmatter",
                     "links": "Relative Links", "cli": "skill_query.py CLI"}
          for key, label in labels.items():
              val = results.get(key, "N/A")
              if val and val.startswith("PASS"):
                  status = f"OK {val}"
              elif val and val.startswith("FAIL"):
                  status = f"FAIL {val}"
              else:
                  status = f"WARN {val}"
              md.append(f"| {label} | {status} |")

          if errors:
              md.append(f"\n### Errors ({len(errors)})\n")
              for e in errors[:30]:
                  md.append(f"- `{e}`")
              if len(errors) > 30:
                  md.append(f"\n... and {len(errors) - 30} more")

          md.append("\n---")
          md.append("_Generated by Validate Workflow_")

          with open("/tmp/val_summary.md", "w") as f:
              f.write("\n".join(md))
          PYEOF

          cat /tmp/val_summary.md >> "$GITHUB_STEP_SUMMARY"
